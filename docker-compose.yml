version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_page
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    environment:
      PORT: 8000
      APP_ORIGIN: http://localhost:5173
      COOKIE_NAME: jwt
      JWT_SECRET: change-this-secret
      JWT_EXPIRES_IN: 7d
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: personal_page
      TYPEORM_SYNC: 'true'
      RUN_SEED: 'true'
    ports:
      - "8000:8000"
    depends_on:
      - postgres
volumes:
  postgres_data:
